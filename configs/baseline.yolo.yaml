model:
  family: yolo
  checkpoint: yolov8n.pt
  image_size: 640
  pretrained: true

training:
  epochs: 30
  batch: 16
  workers: 4
  seed: 1337
  optimizer: auto
  lr0: 0.01
  lrf: 0.01
  patience: 10

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 5.0
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.0

tracking:
  backend: mlflow
  experiment_name: dtflowcv-baseline
  run_name_prefix: yolov8n-default
