project:
  name: dtflowcv-person-car-baseline
  owner: local
  task_type: detection
  claim_boundary: "First reliable COCO baseline: only classes with at least 1000 train annotations are included."

phase_1:
  input:
    modality: image
    color_space: RGB
    dtype: uint8
    average_resolution: "COCO val2017 native resolution, 640 training resize"
    noise_profile: "COCO natural image noise and compression"
    lighting: "Mixed COCO lighting"
    source: "Static images"
  output:
    type: bounding_box
    training_format: "YOLO txt: class_id x_center y_center width height"
    prediction_format: "YOLO txt: class_id x_center y_center width height confidence"
    coordinate_system: "Normalized xywh in [0, 1]"
  metrics:
    primary: map50
    secondary:
      - map50_95
      - class_ap50
      - fps
      - latency_p99_ms
    acceptance:
      map50_min: 0.50
      latency_p99_ms_max: 50.0
      fps_min: 20.0

dataset:
  public_benchmark:
    name: COCO val2017 person-car target-only subset
    role: first_reliable_baseline
    note: "Classes below 1000 train annotations are excluded from the first baseline."
  annotation_schema:
    min_box_area_ratio: 0.0001
    occlusion_rule: "Keep visible object boxes if a human can identify the class."
    ambiguous_rule: "Mark ambiguous objects for review; do not merge into training labels without QA."
    qa_review_rate: 0.15
  split:
    train: 0.70
    val: 0.15
    test: 0.15
    strategy: multilabel_stratified_by_class_presence

classes:
  - person
  - car
